<!DOCTYPE html>
<html>

<head>

<title>Checkout</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<h1 class="center">
Checkout
</h1>

Please fill up your information below.
<br><br>

After submitting your order, the owner will contact you through Discord.

<br><br>

You can also add the owner:
<br>

<input 
id="discord"
placeholder="Discord Username">

<button 
class="btn"
onclick="submitOrder()">

Submit Order

</button>


</div>




<script src="js/checkout.js"></script>


</body>

</html>
